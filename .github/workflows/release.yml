name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  WASM_BINDGEN_VERSION: "0.2.126"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "tag=v${version}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

  build-linux:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            pkg-config

      - name: Build Linux binary
        run: cargo build --release

      - name: Package Linux binary
        run: |
          mkdir -p release/linux
          cp target/release/fireworks release/linux/
          cp LICENSE release/linux/
          tar -czf fireworks-linux-x86_64.tar.gz -C release/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: fireworks-linux-x86_64.tar.gz
          if-no-files-found: error

  build-web:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install web build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen
          cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION" --locked

      - name: Build web bundle
        run: ./scripts/build_web.sh

      - name: Package web bundle
        run: tar -czf fireworks-web.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: fireworks-web.tar.gz
          if-no-files-found: error

      # Rolling tag `web` — jtslay.com downloads this instead of compiling WASM.
      - name: Publish web release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes="Web build from \`${GITHUB_SHA}\`.

          Asset \`fireworks-web.tar.gz\` is consumed by [jtslay.com](https://jtslay.com/fireworks/)."
          if gh release view web >/dev/null 2>&1; then
            gh release upload web fireworks-web.tar.gz --clobber
            gh release edit web --target "${GITHUB_SHA}" --notes "${notes}"
          else
            gh release create web fireworks-web.tar.gz \
              --title "Web build" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}" \
              --latest=false
          fi

      # Optional: set JTSLAY_COM_DISPATCH_TOKEN (PAT with repo scope on jasonslay/jtslay.com)
      # so fireworks pushes also redeploy https://jtslay.com/fireworks/
      - name: Trigger jtslay.com redeploy
        env:
          DISPATCH_TOKEN: ${{ secrets.JTSLAY_COM_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "JTSLAY_COM_DISPATCH_TOKEN not set; skipping jtslay.com redeploy"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jasonslay/jtslay.com/dispatches \
            -d "{\"event_type\":\"fireworks-updated\",\"client_payload\":{\"sha\":\"${GITHUB_SHA}\"}}"

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux, build-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: web
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/fireworks-linux-x86_64.tar.gz
            artifacts/fireworks-web.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
