name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  WASM_BINDGEN_VERSION: "0.2.126"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            pkg-config

      - name: Build Linux binary
        run: cargo build --release

      - name: Package Linux binary
        run: |
          mkdir -p release/linux
          cp target/release/fireworks release/linux/
          cp LICENSE release/linux/
          tar -czf fireworks-linux-x86_64.tar.gz -C release/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: fireworks-linux-x86_64.tar.gz
          if-no-files-found: error

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install web build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen
          cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION" --locked

      - name: Build web bundle
        run: ./scripts/build_web.sh

      - name: Package web bundle
        run: tar -czf fireworks-web.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: |
            fireworks-web.tar.gz
            dist
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-linux, build-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: web
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/fireworks-linux-x86_64.tar.gz
            artifacts/fireworks-web.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web
          path: web-artifact

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-artifact/dist

      - uses: actions/deploy-pages@v4
        id: deployment
